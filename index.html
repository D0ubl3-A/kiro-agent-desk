<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Kiro Code Builder</title><style>body{margin:0;background:#101214;color:#f7f3ea;font-family:system-ui,sans-serif}header{padding:16px 20px;border-bottom:1px solid #394149;background:#15191d}h1{margin:0;font-size:22px}p{color:#aaa49a}.wrap{display:grid;grid-template-columns:360px 1fr;min-height:calc(100vh - 74px)}aside{padding:16px;border-right:1px solid #394149;background:#15191d}main{padding:16px}textarea,input,select,button{font:inherit}textarea,input,select{width:100%;box-sizing:border-box;background:#0c0e10;color:#f7f3ea;border:1px solid #394149;border-radius:8px;padding:10px;margin:7px 0 12px}textarea{min-height:210px}button{border:1px solid #394149;border-radius:8px;background:#232a31;color:#f7f3ea;padding:10px 12px;font-weight:800;cursor:pointer;margin:4px 4px 4px 0}.go{background:#f1bd5b;color:#171107}.grid{display:grid;grid-template-columns:repeat(2,minmax(260px,1fr));gap:12px}.card{border:1px solid #394149;border-radius:8px;background:#181c20;overflow:hidden}.card h2{margin:0;padding:10px 12px;font-size:14px;background:#232a31;border-bottom:1px solid #394149}.out{width:100%;min-height:220px;border:0;border-radius:0;background:#0b0d0e;color:#e8edf2;font:12px/1.45 Consolas,monospace;padding:12px;white-space:pre;overflow:auto}.bar{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:12px}.m{border:1px solid #394149;border-radius:8px;padding:10px;background:#181c20}.m b{display:block;font-size:19px}@media(max-width:850px){.wrap{grid-template-columns:1fr}.grid{grid-template-columns:1fr}aside{border-right:0;border-bottom:1px solid #394149}}</style></head><body><header><h1>Kiro Code Builder</h1><p>It codes now: prompt in, deployable files out.</p></header><div class="wrap"><aside><label>Project prompt</label><textarea id="prompt">Build a client intake and proposal tool. It should accept messy notes, extract client needs, create tasks, draft a reply, and export a handoff.</textarea><label>Project name</label><input id="name" value="Studio Proposal Desk"><label>Main button</label><input id="act" value="Run Workflow"><button class="go" onclick="gen()">Generate Code</button><button onclick="dlpack()">Download Pack</button><button onclick="copy(outIndex.value)">Copy App</button><button onclick="copy(outReadme.value)">Copy README</button></aside><main><div class="bar"><div class="m"><b id="files">0</b><span>files</span></div><div class="m"><b id="ready">No</b><span>ready</span></div><div class="m"><b id="chars">0</b><span>code chars</span></div><div class="m"><b id="state">Idle</b><span>status</span></div></div><div class="grid"><div class="card"><h2>index.html</h2><textarea id="outIndex" class="out" readonly></textarea></div><div class="card"><h2>README.md</h2><textarea id="outReadme" class="out" readonly></textarea></div><div class="card"><h2>.kiro/specs/requirements.md</h2><textarea id="outReq" class="out" readonly></textarea></div><div class="card"><h2>.kiro/specs/tasks.md</h2><textarea id="outTasks" class="out" readonly></textarea></div></div></main></div><script>let pack={};function safe(s){return String(s||'').replace(/[&<>]/g,x=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[x]))}function slug(s){return(s||'app').toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'')||'app'}function copy(s){navigator.clipboard&&navigator.clipboard.writeText(s)}function dl(n,s,t='text/plain'){let b=new Blob([s],{type:t}),u=URL.createObjectURL(b),a=document.createElement('a');a.href=u;a.download=n;a.click();URL.revokeObjectURL(u)}function app(name,act,prompt){return`<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>${safe(name)}</title><style>body{font-family:system-ui;margin:0;background:#111;color:#f7f3ea}main{max-width:980px;margin:auto;padding:24px}textarea{width:100%;min-height:180px;background:#080808;color:#fff;border:1px solid #444;border-radius:8px;padding:12px}button{padding:10px 14px;border:0;border-radius:8px;background:#f1bd5b;font-weight:800}.box{border:1px solid #444;border-radius:8px;padding:14px;margin-top:14px;background:#1b1b1b;white-space:pre-wrap}</style></head><body><main><h1>${safe(name)}</h1><p>${safe(prompt)}</p><textarea id="in">Paste real input here.</textarea><br><button onclick="run()">${safe(act)}</button><div id="out" class="box">Waiting.</div></main><script>function run(){let v=document.getElementById('in').value.trim();let tasks=['Clarify request','Extract requirements','Create task list','Draft response','Export handoff'];document.getElementById('out').textContent='Input: '+v+'\\n\\nTasks:\\n'+tasks.map((x,i)=>(i+1)+'. '+x).join('\\n')}<\/script></body></html>`}function gen(){let name=document.getElementById('name').value||'Generated App',prompt=document.getElementById('prompt').value||'',act=document.getElementById('act').value||'Run';let idx=app(name,act,prompt),read=`# ${name}\n\n${prompt}\n\n## Run\n\nOpen index.html in a browser.\n\n## Demo\n\nPaste input, click ${act}, review generated handoff.\n`,req=`# Requirements\n\nGoal: ${prompt}\n\nAcceptance criteria:\n1. Runs in browser.\n2. Accepts user input.\n3. Generates useful output.\n4. Can be demoed in under 3 minutes.\n`,tasks=`# Tasks\n\n1. Review generated code.\n2. Open index.html.\n3. Test main workflow.\n4. Commit files.\n5. Deploy to GitHub Pages.\n`;pack={'index.html':idx,'README.md':read,'.kiro/specs/requirements.md':req,'.kiro/specs/tasks.md':tasks,'.kiro/agents/builder-agent.md':'# Builder Agent\n\nGenerate complete files from rough prompts.\n'};outIndex.value=idx;outReadme.value=read;outReq.value=req;outTasks.value=tasks;files.textContent=Object.keys(pack).length;ready.textContent='Yes';chars.textContent=idx.length;state.textContent='Built'}function dlpack(){if(!Object.keys(pack).length)gen();dl(slug(document.getElementById('name').value)+'-code-pack.json',JSON.stringify(pack,null,2),'application/json')}gen();</script></body></html>
