<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>The Brain Code Builder</title><style>body{margin:0;background:#101214;color:#f7f3ea;font-family:system-ui,sans-serif}header{padding:16px 20px;border-bottom:1px solid #394149;background:#15191d}h1{margin:0;font-size:22px}p{margin:4px 0 0;color:#aaa49a}.wrap{display:grid;grid-template-columns:380px 1fr;min-height:calc(100vh - 74px)}aside{padding:16px;border-right:1px solid #394149;background:#15191d}main{padding:16px}textarea,input,button{font:inherit}textarea,input{width:100%;box-sizing:border-box;background:#0c0e10;color:#f7f3ea;border:1px solid #394149;border-radius:8px;padding:10px;margin:7px 0 12px}textarea{min-height:150px}button{border:1px solid #394149;border-radius:8px;background:#232a31;color:#f7f3ea;padding:10px 12px;font-weight:800;cursor:pointer;margin:4px 4px 4px 0}.go{background:#f1bd5b;color:#171107}.grid{display:grid;grid-template-columns:repeat(2,minmax(260px,1fr));gap:12px}.card{border:1px solid #394149;border-radius:8px;background:#181c20;overflow:hidden}.card h2{margin:0;padding:10px 12px;font-size:14px;background:#232a31;border-bottom:1px solid #394149}.out{width:100%;min-height:190px;border:0;border-radius:0;background:#0b0d0e;color:#e8edf2;font:12px/1.45 Consolas,monospace;padding:12px;white-space:pre;overflow:auto}.bar{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:12px}.m{border:1px solid #394149;border-radius:8px;padding:10px;background:#181c20}.m b{display:block;font-size:18px}.chat{height:170px;overflow:auto;background:#0b0d0e;border:1px solid #394149;border-radius:8px;padding:10px;color:#dfe6ee;white-space:pre-wrap}.ok{color:#80df9b}.warn{color:#f1bd5b}@media(max-width:900px){.wrap{grid-template-columns:1fr}.grid{grid-template-columns:1fr}aside{border-right:0;border-bottom:1px solid #394149}.bar{grid-template-columns:repeat(2,1fr)}}</style></head><body><header><h1>The Brain Code Builder</h1><p>One mission controller + bounded agents + verification + code pack export.</p></header><div class="wrap"><aside><label>Mission</label><textarea id="mission">Build a client intake app that turns messy notes into requirements, tasks, a reply draft, and an exportable handoff.</textarea><label>Brain chat</label><div id="chat" class="chat">Brain> Waiting. Agents will not run until you click Run Brain.</div><input id="msg" placeholder="Tell The Brain what to refine..."><button onclick="talk()">Chat</button><button class="go" onclick="runBrain()">Run Brain</button><button onclick="finalize()">Final</button><button onclick="downloadPack()">Download Code Pack</button></aside><main><div class="bar"><div class="m"><b id="state">Waiting</b><span>state</span></div><div class="m"><b id="tasksN">0</b><span>tasks</span></div><div class="m"><b id="accepted">0</b><span>accepted</span></div><div class="m"><b id="score">0</b><span>score</span></div><div class="m"><b id="ready">No</b><span>code ready</span></div></div><div class="grid"><div class="card"><h2>Agent Queue</h2><textarea id="queue" class="out" readonly></textarea></div><div class="card"><h2>Verification Buffer</h2><textarea id="verify" class="out" readonly></textarea></div><div class="card"><h2>Generated index.html</h2><textarea id="code" class="out" readonly></textarea></div><div class="card"><h2>Final Synthesis</h2><textarea id="final" class="out" readonly></textarea></div></div></main></div><script>let hist=[],tasks=[],pack={};const $=id=>document.getElementById(id);function say(x){chat.textContent+='\nBrain> '+x;chat.scrollTop=chat.scrollHeight;hist.push(x)}function clean(s){return String(s||'').trim()}function esc(s){return String(s||'').replace(/[&<>]/g,x=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[x]))}function talk(){let m=clean(msg.value);if(!m)return;hist.push('User: '+m);mission.value=m.toLowerCase().startsWith('goal:')?m.slice(5).trim():mission.value;say(m.includes('?')?'I can answer, but I will not run agents without Run Brain. Current mission is: '+mission.value:'Mission note saved. Click Run Brain when ready.');msg.value=''}function makeTasks(goal){return[{id:'A1',role:'Architect',work:'turn mission into requirements',gate:'requirements exist with risk and next action'},{id:'A2',role:'Coder',work:'generate deployable single-file app',gate:'code exists and runs in browser'},{id:'A3',role:'Verifier',work:'score output against mission',gate:'score and blocker note exist'},{id:'A4',role:'Shipper',work:'prepare README and .kiro notes',gate:'submission handoff exists'}].map(t=>({...t,status:'queued',score:0,result:'',risk:'',next:''}))}function runBrain(){let goal=clean(mission.value);tasks=makeTasks(goal);state.textContent='Running';tasksN.textContent=tasks.length;queue.value=tasks.map(t=>`${t.id} ${t.role}: ${t.work} [${t.status}]`).join('\n');let app=`<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Brain Built App</title><style>body{font-family:system-ui;margin:0;background:#111;color:#f7f3ea}main{max-width:900px;margin:auto;padding:24px}textarea{width:100%;min-height:160px;background:#080808;color:white;border:1px solid #444;border-radius:8px;padding:12px}button{padding:10px 14px;border:0;border-radius:8px;background:#f1bd5b;font-weight:800}.box{white-space:pre-wrap;border:1px solid #444;border-radius:8px;background:#1b1b1b;margin-top:14px;padding:14px}</style></head><body><main><h1>Brain Built App</h1><p>${esc(goal)}</p><textarea id="in">Paste input here.</textarea><br><button onclick="run()">Run Workflow</button><div id="out" class="box">Waiting.</div></main><script>function run(){let v=document.getElementById('in').value;document.getElementById('out').textContent='Requirements extracted from: '+v+'\\n\\nTasks:\\n1. Clarify input\\n2. Generate plan\\n3. Draft output\\n4. Export handoff'}<\/script></body></html>`;let read=`# Brain Built App\n\nMission: ${goal}\n\nGenerated by The Brain Code Builder with an explicit run gate, simulated agents, verification buffer, and exportable code pack.\n`;pack={'index.html':app,'README.md':read,'.kiro/specs/requirements.md':'# Requirements\n\n'+goal,' .kiro/specs/tasks.md':'# Tasks\n\n1. Run Brain\n2. Verify generated app\n3. Commit code\n4. Deploy'};tasks.forEach((t,i)=>{t.status='accepted';t.score=86+i*3;t.result=i==1?'Generated browser app code.':i==2?'Verified concrete output, risk note, next action.':i==3?'Prepared README and .kiro handoff.':'Requirements and success criteria captured.';t.risk=i==1?'Generated code is offline and deterministic, not a live model.':'No blocker.';t.next=i==3?'Commit and deploy.':'Feed accepted result into synthesis.'});queue.value=tasks.map(t=>`${t.id} ${t.role}: ${t.status} score=${t.score}`).join('\n');verify.value=tasks.map(t=>`${t.id} ${t.role}\nResult: ${t.result}\nRisk: ${t.risk}\nNext: ${t.next}\n`).join('\n');code.value=app;accepted.textContent=tasks.length;score.textContent=Math.round(tasks.reduce((a,t)=>a+t.score,0)/tasks.length);ready.textContent='Yes';state.textContent='Accepted';say('Agents ran with bounded simulated execution. Four outputs accepted and code pack is ready.')}function finalize(){let goal=clean(mission.value);final.value=`Mission: ${goal}\n\nFinal: The Brain created a verified browser app plus README and .kiro handoff.\n\nAccepted agents: ${tasks.filter(t=>t.status==='accepted').length}/${tasks.length}.\n\nNext action: commit generated pack or use the current repo as the live demo.`;say('Final synthesis updated.')}function downloadPack(){if(!Object.keys(pack).length)runBrain();let b=new Blob([JSON.stringify(pack,null,2)],{type:'application/json'}),u=URL.createObjectURL(b),a=document.createElement('a');a.href=u;a.download='the-brain-code-pack.json';a.click();URL.revokeObjectURL(u);say('Downloaded code pack JSON.')}finalize();</script></body></html>
